name: Alpha Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Optional full commit SHA; defaults to the selected ref
        required: false
        type: string
      release_notes:
        description: Optional structured release-note override
        required: false
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: alpha-release-${{ inputs.candidate_sha || github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  alpha-release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    name: Build verified alpha
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.candidate_sha || github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Resolve verified release metadata
        env:
          CANDIDATE_SHA_INPUT: ${{ inputs.candidate_sha || github.event.workflow_run.head_sha || github.sha }}
          RELEASE_NOTES_INPUT: ${{ inputs.release_notes }}
          CI_RUN_URL: ${{ github.event.workflow_run.html_url }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ ! "$CANDIDATE_SHA_INPUT" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "candidate_sha must be a full 40-character commit SHA." >&2
            exit 1
          fi

          candidate_sha="$(git rev-parse HEAD)"
          if [[ "$candidate_sha" != "${CANDIDATE_SHA_INPUT,,}" ]]; then
            echo "The checkout does not match candidate_sha." >&2
            exit 1
          fi

          git fetch origin main
          git merge-base --is-ancestor "$candidate_sha" origin/main

          if [[ -z "$CI_RUN_URL" ]]; then
            CI_RUN_URL="$(gh api \
              "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?head_sha=$candidate_sha&event=push&status=success&per_page=1" \
              --jq '.workflow_runs[0].html_url // empty')"
          fi
          if [[ -z "$CI_RUN_URL" ]]; then
            echo "No successful main-push CI run exists for candidate $candidate_sha." >&2
            exit 1
          fi

          release_tag="alpha-$candidate_sha"
          notes_path="$RUNNER_TEMP/candidate-release-notes.md"
          if [[ -n "$RELEASE_NOTES_INPUT" ]]; then
            printf '%s\n' "$RELEASE_NOTES_INPUT" > "$notes_path"
          else
            previous_tag="$(git tag --merged "$candidate_sha" --list 'alpha-*' --sort=-creatordate | head -n 1)"
            generate_args=(
              --method POST
              "repos/$GITHUB_REPOSITORY/releases/generate-notes"
              -f "tag_name=$release_tag"
              -f "target_commitish=$candidate_sha"
            )
            if [[ -n "$previous_tag" ]]; then
              generate_args+=(-f "previous_tag_name=$previous_tag")
            fi
            generated_changes="$(gh api "${generate_args[@]}" --jq .body)"
            comparison="${previous_tag:-the start of the repository}"
            cat > "$notes_path" <<EOF
          ## Changed

          Changes since $comparison:

          $generated_changes

          ## Verification

          - Exact candidate: \`$candidate_sha\`
          - [Successful CI verification]($CI_RUN_URL)

          ## Known Limitations

          - No additional limitations were supplied; see the linked issues and pull requests above.
          EOF
          fi

          pwsh .github/scripts/write-release-notes.ps1 \
            -ReleaseChannel alpha \
            -CommitSha "$candidate_sha" \
            -ReleaseNotesPath "$notes_path" \
            -RequireReleaseNotes \
            -ValidateOnly

          echo "CANDIDATE_SHA=$candidate_sha" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_PATH=$notes_path" >> "$GITHUB_ENV"

      - name: Skip an already published candidate
        id: existing_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK
        if: steps.existing_release.outputs.already_published != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        if: steps.existing_release.outputs.already_published != 'true'
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Set up Gradle
        if: steps.existing_release.outputs.already_published != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        if: steps.existing_release.outputs.already_published != 'true'
        env:
          RIFFLE_SIGNING_KEYSTORE_BASE64: ${{ secrets.RIFFLE_SIGNING_KEYSTORE_BASE64 }}
        run: |
          test -n "$RIFFLE_SIGNING_KEYSTORE_BASE64"
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$RIFFLE_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/riffle-release.jks"

      - name: Build release artifacts
        if: steps.existing_release.outputs.already_published != 'true'
        env:
          RIFFLE_SIGNING_STORE_FILE: ${{ runner.temp }}/signing/riffle-release.jks
          RIFFLE_SIGNING_STORE_PASSWORD: ${{ secrets.RIFFLE_SIGNING_STORE_PASSWORD }}
          RIFFLE_SIGNING_KEY_ALIAS: ${{ secrets.RIFFLE_SIGNING_KEY_ALIAS }}
          RIFFLE_SIGNING_KEY_PASSWORD: ${{ secrets.RIFFLE_SIGNING_KEY_PASSWORD }}
          RIFFLE_VERSION_CODE: ${{ github.run_number }}
          RIFFLE_VERSION_NAME: 0.1.0-alpha.${{ github.run_number }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload release artifacts
        if: steps.existing_release.outputs.already_published != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: riffle-alpha-release-${{ github.run_id }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 1

      - name: Publish alpha prerelease
        if: steps.existing_release.outputs.already_published != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$RUNNER_TEMP/release"
          cp app/build/outputs/apk/release/*.apk "$RUNNER_TEMP/release/riffle-alpha.apk"
          cp app/build/outputs/bundle/release/*.aab "$RUNNER_TEMP/release/riffle-alpha.aab"
          pwsh .github/scripts/assert-artifact-size.ps1 \
            -ArtifactPath "$RUNNER_TEMP/release/riffle-alpha.apk" \
            -MaxBytes 26214400 \
            -BudgetName "Alpha APK"

          pwsh .github/scripts/write-release-notes.ps1 \
            -ReleaseChannel alpha \
            -CommitSha "$CANDIDATE_SHA" \
            -ApkPath "$RUNNER_TEMP/release/riffle-alpha.apk" \
            -AabPath "$RUNNER_TEMP/release/riffle-alpha.aab" \
            -NotesPath "$RUNNER_TEMP/release-notes.md" \
            -ReleaseNotesPath "$RELEASE_NOTES_PATH" \
            -RequireReleaseNotes

          gh release create "$RELEASE_TAG" \
            "$RUNNER_TEMP/release/riffle-alpha.apk" \
            "$RUNNER_TEMP/release/riffle-alpha.aab" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$CANDIDATE_SHA" \
            --title "Riffle Alpha ${CANDIDATE_SHA:0:12}" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --prerelease
