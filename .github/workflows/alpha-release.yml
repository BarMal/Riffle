name: Alpha Release

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Full 40-character commit SHA reachable from main
        required: true
        type: string
      release_notes:
        description: Release notes with Changed, Verification, and Known Limitations sections
        required: true
        type: string
      evidence_manifest:
        description: Repository-relative path to the SHA-bound device evidence manifest
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: alpha-release-${{ inputs.candidate_sha }}
  cancel-in-progress: false

jobs:
  alpha-release:
    name: Build verified alpha
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 0

      - name: Validate candidate identity and notes
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          EVIDENCE_MANIFEST: ${{ inputs.evidence_manifest }}
        run: |
          if [[ ! "$CANDIDATE_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "candidate_sha must be a full 40-character commit SHA." >&2
            exit 1
          fi

          candidate_sha="$(git rev-parse "$CANDIDATE_SHA^{commit}")"
          if [[ "$candidate_sha" != "${CANDIDATE_SHA,,}" ]]; then
            echo "candidate_sha must identify the commit exactly." >&2
            exit 1
          fi

          git fetch origin main
          git merge-base --is-ancestor "$candidate_sha" origin/main

          if [[ "$EVIDENCE_MANIFEST" = /* || "$EVIDENCE_MANIFEST" == *".."* ]]; then
            echo "evidence_manifest must be a repository-relative path without parent traversal." >&2
            exit 1
          fi
          evidence_path="$(realpath "$EVIDENCE_MANIFEST")"
          if [[ "$evidence_path" != "$GITHUB_WORKSPACE"/* ]]; then
            echo "evidence_manifest must resolve inside the candidate checkout." >&2
            exit 1
          fi
          pwsh .github/scripts/validate-device-evidence.ps1 \
            -EvidencePath "$evidence_path" \
            -ExpectedCommitSha "$candidate_sha"

          notes_path="$RUNNER_TEMP/candidate-release-notes.md"
          printf '%s\n' "$RELEASE_NOTES" > "$notes_path"
          pwsh .github/scripts/write-release-notes.ps1 \
            -ReleaseChannel alpha \
            -CommitSha "$candidate_sha" \
            -ReleaseNotesPath "$notes_path" \
            -RequireReleaseNotes \
            -ValidateOnly

          echo "CANDIDATE_SHA=$candidate_sha" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=alpha-$candidate_sha" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_PATH=$notes_path" >> "$GITHUB_ENV"

      - name: Run release contract tests
        shell: pwsh
        run: |
          Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0.0
          Invoke-Pester .github/scripts/test/write-release-notes.Tests.ps1 -CI -Output Detailed

      - name: Skip an already published candidate
        id: existing_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK
        if: steps.existing_release.outputs.already_published != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        if: steps.existing_release.outputs.already_published != 'true'
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Enable KVM
        if: steps.existing_release.outputs.already_published != 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Gradle
        if: steps.existing_release.outputs.already_published != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Verify candidate
        if: steps.existing_release.outputs.already_published != 'true'
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          script: ./gradlew verify

      - name: Decode release keystore
        if: steps.existing_release.outputs.already_published != 'true'
        env:
          RIFFLE_SIGNING_KEYSTORE_BASE64: ${{ secrets.RIFFLE_SIGNING_KEYSTORE_BASE64 }}
        run: |
          test -n "$RIFFLE_SIGNING_KEYSTORE_BASE64"
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$RIFFLE_SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/riffle-release.jks"

      - name: Build release artifacts
        if: steps.existing_release.outputs.already_published != 'true'
        env:
          RIFFLE_SIGNING_STORE_FILE: ${{ runner.temp }}/signing/riffle-release.jks
          RIFFLE_SIGNING_STORE_PASSWORD: ${{ secrets.RIFFLE_SIGNING_STORE_PASSWORD }}
          RIFFLE_SIGNING_KEY_ALIAS: ${{ secrets.RIFFLE_SIGNING_KEY_ALIAS }}
          RIFFLE_SIGNING_KEY_PASSWORD: ${{ secrets.RIFFLE_SIGNING_KEY_PASSWORD }}
          RIFFLE_VERSION_CODE: ${{ github.run_number }}
          RIFFLE_VERSION_NAME: 0.1.0-alpha.${{ github.run_number }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload release artifacts
        if: steps.existing_release.outputs.already_published != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: riffle-alpha-release-${{ inputs.candidate_sha }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 1

      - name: Publish alpha prerelease
        if: steps.existing_release.outputs.already_published != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$RUNNER_TEMP/release"
          cp app/build/outputs/apk/release/*.apk "$RUNNER_TEMP/release/riffle-alpha.apk"
          cp app/build/outputs/bundle/release/*.aab "$RUNNER_TEMP/release/riffle-alpha.aab"
          pwsh .github/scripts/assert-artifact-size.ps1 \
            -ArtifactPath "$RUNNER_TEMP/release/riffle-alpha.apk" \
            -MaxBytes 26214400 \
            -BudgetName "Alpha APK"

          pwsh .github/scripts/write-release-notes.ps1 \
            -ReleaseChannel alpha \
            -CommitSha "$CANDIDATE_SHA" \
            -ApkPath "$RUNNER_TEMP/release/riffle-alpha.apk" \
            -AabPath "$RUNNER_TEMP/release/riffle-alpha.aab" \
            -NotesPath "$RUNNER_TEMP/release-notes.md" \
            -ReleaseNotesPath "$RELEASE_NOTES_PATH" \
            -RequireReleaseNotes

          gh release create "$RELEASE_TAG" \
            "$RUNNER_TEMP/release/riffle-alpha.apk" \
            "$RUNNER_TEMP/release/riffle-alpha.aab" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$CANDIDATE_SHA" \
            --title "Riffle Alpha ${CANDIDATE_SHA:0:12}" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --prerelease
